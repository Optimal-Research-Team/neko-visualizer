<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimal · Full Body Scan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..500&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app">
  <!-- soft blue scan-field glow behind the transparent canvas (multiply, no white blowout) -->
  <div id="scan-glow"></div>
  <div id="canvas-wrap"></div>
  <svg id="leaders" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="labels"></div>

  <!-- minimal top bar -->
  <header id="topbar">
    <div class="logo">
      <span class="logo-mark">◍</span>
      <span class="logo-word">optimal</span>
    </div>
    <div class="topbar-right">
      <div class="scan-id">FULL BODY SCAN · 2026.06.09</div>
      <button class="cta">View full report</button>
    </div>
  </header>

  <!-- bottom-left: identity + group nav -->
  <section id="identity">
    <div class="ident-eyebrow">PATIENT</div>
    <h1 class="ident-name">Jennifer</h1>
    <div class="ident-sub">33 years · scan #84210</div>
    <nav class="groups">
      <button class="group active" data-group="Heart &amp; Circulation">Heart &amp; Circulation</button>
      <button class="group" data-group="Body">Body</button>
      <button class="group" data-group="Skin">Skin</button>
    </nav>
    <div class="measuring">
      <span class="measuring-arrow">→</span>
      <span class="measuring-count" id="measuring-count">7</span>
      <span class="measuring-label">measuring points</span>
    </div>
  </section>

  <!-- right: heart-age gauge + score -->
  <aside id="summary">
    <div class="summary-block">
      <div class="summary-eyebrow" id="gauge-eyebrow">ARTERIAL AGE</div>
      <div class="gauge">
        <svg viewBox="0 0 160 160" width="148" height="148">
          <circle class="gauge-track" cx="80" cy="80" r="66" />
          <circle class="gauge-arc" id="gauge-arc" cx="80" cy="80" r="66" />
        </svg>
        <div class="gauge-center">
          <div class="gauge-num" id="gauge-num">41</div>
          <div class="gauge-cap">years</div>
        </div>
      </div>
      <div class="gauge-delta" id="gauge-delta">−3 yrs vs. actual</div>
    </div>
    <div class="summary-block score-block">
      <div class="summary-eyebrow">HEALTH SCORE</div>
      <div class="score-line">
        <span class="score-num">91</span>
        <span class="score-out">/100</span>
      </div>
      <div class="score-rule"><span style="width:91%"></span></div>
    </div>
  </aside>

  <!-- bottom-right: hint -->
  <footer id="hint">
    <span class="hint-dot"></span>
    <span>Drag to rotate · auto-scan active</span>
  </footer>

  <div id="boot"><div class="boot-ring"></div></div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
